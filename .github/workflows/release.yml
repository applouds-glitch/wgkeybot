name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
            build-tools;29.0.3
            build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :ui:assembleRelease --stacktrace

      - name: Get version from gradle.properties
        id: version
        run: |
          VERSION_NAME=$(grep wireguardVersionName gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME"

      - name: Generate release notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -n 1)

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating notes from $PREVIOUS_TAG to HEAD"
            COMMITS=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
            CHANGELOG_LINK="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}"
          else
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)")
            CHANGELOG_LINK="Initial release"
          fi

          cat > RELEASE_NOTES.md << EOF
          ## What's Changed

          $COMMITS

          $CHANGELOG_LINK
          EOF

          echo "release_notes_file=RELEASE_NOTES.md" >> $GITHUB_OUTPUT
      - name: Rename APK
        run: mv ui/build/outputs/apk/release/ui-release.apk
          ui/build/outputs/apk/release/wgkeybot-v${{
          steps.version.outputs.version }}.apk

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: ui/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          #files: ui/build/outputs/apk/release/wg-turn-v${{ steps.version.outputs.version }}.apk
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          draft: false
          prerelease: false
          body_path: ${{ steps.release_notes.outputs.release_notes_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
